<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup 2026 — Prediction Contest Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --line: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #2f81f7;
    --gold: #f3b521; --silver: #b8c2cc; --bronze: #cd7f32;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; color: var(--text);
    font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1100px 500px at 50% -8%, rgba(47,129,247,.22), transparent 60%),
      var(--bg);
  }
  header {
    padding: 22px 32px; position: relative; overflow: hidden;
    background: linear-gradient(120deg,#0b3d91,#1a73e8 45%,#00c2a8);
    background-size: 200% 200%; animation: flow 14s ease infinite;
  }
  @keyframes flow { 0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%} }
  header h1 { margin: 0; font-size: 24px; }
  header .meta { color: rgba(255,255,255,.85); font-size: 13px; margin-top: 4px; }
  header .ball { position:absolute; right:26px; top:14px; font-size:60px;
                 animation: spin 9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  main { padding: 24px 32px; max-width: 1180px; margin: 0 auto; }
  .grid { display: grid; gap: 20px; grid-template-columns: 1fr 1fr; }
  @media (max-width: 880px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid var(--line);
          border-radius: 14px; padding: 18px 20px; }
  .card h2 { margin: 0 0 14px; font-size: 14px; font-weight: 600; color: var(--muted);
             text-transform: uppercase; letter-spacing: .05em; }
  .span2 { grid-column: 1 / -1; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: none; }
  .rank { font-weight: 700; width: 36px; }
  .r1 { color: var(--gold); } .r2 { color: var(--silver); } .r3 { color: var(--bronze); }
  .total { font-weight: 700; }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px;
          background:#21262d; color:var(--muted); font-size:12px; }
  .empty { color: var(--muted); padding: 24px 0; text-align:center; }
  canvas { max-height: 340px; }
  footer { color: var(--muted); font-size: 12px; padding: 16px 32px; }

  /* podium */
  .podium-wrap { display:flex; justify-content:center; align-items:flex-end;
                 gap:22px; padding:14px 0 6px; }
  .podium { text-align:center; position:relative; }
  .crown { font-size:30px; animation: bob 2s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)} }
  .jersey { filter: drop-shadow(0 5px 8px rgba(0,0,0,.45)); }
  .pod-name { font-weight:700; margin-top:4px; }
  .pod-pts { font-size:12px; color:var(--muted); }
  .pedestal { width:128px; border-radius:14px 14px 6px 6px; margin-top:8px;
              color:#08213f; font-weight:800; font-size:34px; padding-top:8px;
              box-shadow: inset 0 -8px 0 rgba(0,0,0,.18); }
  .p1 .pedestal { height:150px; background:linear-gradient(180deg,#ffe27a,#f3b521);
                  animation: glow 2.6s ease-in-out infinite; }
  .p2 .pedestal { height:112px; background:linear-gradient(180deg,#eef2f6,#b8c2cc); }
  .p3 .pedestal { height:90px;  background:linear-gradient(180deg,#f0b483,#cd7f32); }
  @keyframes glow { 0%,100%{box-shadow:inset 0 -8px 0 rgba(0,0,0,.18),0 0 0 rgba(243,181,33,0)}
                    50%{box-shadow:inset 0 -8px 0 rgba(0,0,0,.18),0 0 30px rgba(243,181,33,.85)} }
  .spark { position:absolute; width:8px; height:8px; border-radius:50%; background:#fff;
           opacity:0; animation: sparkle 2.2s linear infinite; }
  @keyframes sparkle { 0%{opacity:0;transform:scale(.4) translateY(0)}30%{opacity:1}
                       100%{opacity:0;transform:scale(1.1) translateY(-28px)} }
  .confetti { position:fixed; top:-12px; width:9px; height:14px; opacity:.9;
              animation: fall linear forwards; z-index:50; }
  @keyframes fall { to { transform: translateY(105vh) rotate(720deg); opacity:.7; } }
</style>
</head>
<body>
<header>
  <div class="ball">⚽</div>
  <h1>World Cup 2026 — Prediction Contest</h1>
  <div class="meta" id="meta"></div>
</header>
<main>
  <div class="grid">
    <div class="card span2">
      <h2>🏆 Podium</h2>
      <div id="podium"></div>
    </div>
    <div class="card span2">
      <h2>Full leaderboard</h2>
      <div id="leaderboard"></div>
    </div>
    <div class="card span2">
      <h2>Points over time</h2>
      <canvas id="timeline"></canvas>
    </div>
    <div class="card">
      <h2>Points by category (top 10)</h2>
      <canvas id="breakdown"></canvas>
    </div>
    <div class="card">
      <h2>Latest results</h2>
      <div id="results"></div>
    </div>
  </div>
</main>
<footer>
  Static dashboard — regenerate <code>data.json</code> from the app's Admin tab
  (or <code>uv run python -m wc_contest.export</code>) after each match-day.
  Last generated: <span id="gen"></span>
</footer>

<script>
const PALETTE = ["#2f81f7","#3fb950","#d29922","#db61a2","#a371f7","#f85149",
  "#56d4dd","#e3b341","#7ee787","#ff7b72","#79c0ff","#ffa657","#d2a8ff","#39d353"];

function jerseySVG(primary, secondary, pattern, size) {
  const body = "M50 14 C44 14 40 17 35 17 L18 24 L11 41 L24 48 L32 43 L32 88 C32 90 33 91 35 91 L65 91 C67 91 68 90 68 88 L68 43 L76 48 L89 41 L82 24 L65 17 C60 17 56 14 50 14 Z";
  const ls = "M35 17 L18 24 L11 41 L24 48 L32 43 L34 26 Z";
  const rs = "M65 17 L82 24 L89 41 L76 48 L68 43 L66 26 Z";
  const collar = "M40 17 Q50 27 60 17 L56 15 Q50 20 44 15 Z";
  const id = "c" + Math.random().toString(36).slice(2, 8);
  let overlay = "";
  if (pattern === "stripes") for (let x=14;x<86;x+=12) overlay += `<rect x="${x}" y="10" width="6" height="85" fill="${secondary}"/>`;
  else if (pattern === "halves") overlay = `<rect x="50" y="10" width="50" height="90" fill="${secondary}"/>`;
  else if (pattern === "sash") overlay = `<polygon points="14,40 30,90 46,90 22,32" fill="${secondary}"/>`;
  const st = 'stroke="rgba(0,0,0,0.28)" stroke-width="1.6"';
  return `<svg class="jersey" width="${size}" height="${size}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs><clipPath id="${id}"><path d="${body}"/></clipPath></defs>
    <path d="${ls}" fill="${secondary}" ${st}/><path d="${rs}" fill="${secondary}" ${st}/>
    <path d="${body}" fill="${primary}" ${st}/>
    <g clip-path="url(#${id})">${overlay}</g>
    <path d="${body}" fill="none" ${st}/><path d="${collar}" fill="${secondary}" ${st}/></svg>`;
}

async function load() {
  let data;
  try { data = await (await fetch("data.json", {cache:"no-store"})).json(); }
  catch (e) {
    document.getElementById("leaderboard").innerHTML =
      '<div class="empty">Could not load data.json. Generate it from the Admin tab first.</div>';
    return;
  }
  renderMeta(data);
  renderPodium(data.leaderboard || []);
  renderLeaderboard(data.leaderboard || []);
  renderTimeline(data.timeline || {});
  renderBreakdown(data.category_breakdown || []);
  renderResults(data.matches || []);
}

function renderMeta(d) {
  const m = d.meta || {};
  document.getElementById("meta").textContent =
    `${m.participants||0} players · ${m.matches_played||0}/${m.matches_total||0} matches played`;
  document.getElementById("gen").textContent = d.generated_at || "—";
}

function renderPodium(rows) {
  const el = document.getElementById("podium");
  if (!rows.length) { el.innerHTML = '<div class="empty">No players yet.</div>'; return; }
  const top = rows.slice(0, 3);
  const order = [1, 0, 2];
  const crown = ["👑","🥈","🥉"];
  let h = '<div class="podium-wrap">';
  order.forEach(slot => {
    if (slot >= top.length) return;
    const r = top[slot];
    const jersey = jerseySVG(r.shirt_primary||"#2f81f7", r.shirt_secondary||"#fff", r.shirt_pattern||"solid", 84);
    const sparks = slot===0 ? [[15,30,0],[80,20,.6],[50,8,1.1],[28,55,.3]]
      .map(([x,y,d])=>`<span class="spark" style="left:${x}%;top:${y}%;animation-delay:${d}s"></span>`).join("") : "";
    h += `<div class="podium p${slot+1}">${sparks}
      <div class="crown">${crown[slot]}</div>${jersey}
      <div class="pod-name">${esc(r.name)}</div>
      <div class="pod-pts">${r.total_points} pts · ${r.exact_score_hits} exact</div>
      <div class="pedestal">${r.rank}</div></div>`;
  });
  el.innerHTML = h + "</div>";
  if (top.length) confetti();
}

function confetti() {
  if (window._confettiDone) return; window._confettiDone = true;
  const colors = ["#f3b521","#2f81f7","#3fb950","#db61a2","#ff7b72","#ffffff"];
  for (let i=0;i<70;i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.background = colors[i % colors.length];
    c.style.animationDuration = (2.5 + Math.random()*2.5) + "s";
    c.style.animationDelay = (Math.random()*0.8) + "s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 6000);
  }
}

function renderLeaderboard(rows) {
  const el = document.getElementById("leaderboard");
  if (!rows.length) { el.innerHTML = '<div class="empty">No participants yet.</div>'; return; }
  let h = `<table><thead><tr><th class="rank">#</th><th>Player</th>
    <th class="num">Total</th><th class="num">Match</th><th class="num">Outcomes</th>
    <th class="num">Wildcards</th><th class="num">Exact</th></tr></thead><tbody>`;
  for (const r of rows) {
    const rc = r.rank<=3 ? `r${r.rank}` : "";
    h += `<tr><td class="rank ${rc}">${r.rank}</td><td>${esc(r.name)}</td>
      <td class="num total">${r.total_points}</td><td class="num">${r.match_points}</td>
      <td class="num">${r.outcome_points}</td><td class="num">${r.wildcard_points}</td>
      <td class="num">${r.exact_score_hits}</td></tr>`;
  }
  el.innerHTML = h + "</tbody></table>";
}

function renderTimeline(timeline) {
  const names = Object.keys(timeline);
  const ctx = document.getElementById("timeline");
  if (!names.length) { blank(ctx, "No scored matches yet."); return; }
  const dates = [...new Set(names.flatMap(n => timeline[n].map(p => p.date)))].sort();
  const datasets = names.map((n, i) => {
    const map = Object.fromEntries(timeline[n].map(p => [p.date, p.y]));
    let last = 0;
    const series = dates.map(d => { if (d in map) last = map[d]; return last; });
    return { label: n, data: series, borderColor: PALETTE[i%PALETTE.length],
             backgroundColor: PALETTE[i%PALETTE.length], tension: .25, pointRadius: 2, borderWidth: 2 };
  });
  new Chart(ctx, { type: "line", data: { labels: dates, datasets },
    options: { responsive: true, interaction: {mode:"index", intersect:false},
      plugins: { legend: { labels: { color: "#e6edf3", boxWidth: 12 } } },
      scales: { x: { ticks:{color:"#8b949e"}, grid:{color:"#21262d"} },
                y: { ticks:{color:"#8b949e"}, grid:{color:"#21262d"} } } } });
}

function renderBreakdown(rows) {
  const ctx = document.getElementById("breakdown");
  if (!rows.length) { blank(ctx, "No scores yet."); return; }
  const top = rows.slice(0, 10);
  new Chart(ctx, { type: "bar",
    data: { labels: top.map(r=>r.name),
      datasets: [
        {label:"Match", data: top.map(r=>r.match), backgroundColor: PALETTE[0]},
        {label:"Outcomes", data: top.map(r=>r.outcome), backgroundColor: PALETTE[1]},
        {label:"Wildcards", data: top.map(r=>r.wildcard), backgroundColor: PALETTE[2]} ] },
    options: { responsive: true,
      plugins: { legend: { labels: { color:"#e6edf3", boxWidth:12 } } },
      scales: { x: { stacked:true, ticks:{color:"#8b949e"}, grid:{display:false} },
                y: { stacked:true, ticks:{color:"#8b949e"}, grid:{color:"#21262d"} } } } });
}

function renderResults(matches) {
  const el = document.getElementById("results");
  if (!matches.length) { el.innerHTML = '<div class="empty">No results entered yet.</div>'; return; }
  const recent = matches.slice(-12).reverse();
  let h = "<table><tbody>";
  for (const m of recent) {
    h += `<tr><td><span class="pill">${esc(m.stage)}${m.group_code? " "+m.group_code:""}</span></td>
      <td style="text-align:right">${esc(m.home_team)}</td>
      <td class="num total">${m.home_goals} – ${m.away_goals}</td>
      <td>${esc(m.away_team)}</td></tr>`;
  }
  el.innerHTML = h + "</tbody></table>";
}

function blank(ctx, msg) {
  ctx.replaceWith(Object.assign(document.createElement("div"), {className:"empty", textContent: msg}));
}
function esc(s){ return String(s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
load();
</script>
</body>
</html>
