<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Cup 2026 — Prediction Contest Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="dashboard.js" defer></script>
</head>

<body>
  <header>
    <div class="ball">⚽</div>
    <h1>World Cup 2026 — Prediction Contest</h1>
    <div class="meta" id="meta"></div>
  </header>
  <main>
    <div class="grid">
      <div class="card span2">
        <h2>🏆 Podium</h2>
        <div id="podium"></div>
      </div>
      <div class="card span2">
        <h2>Full leaderboard</h2>
        <div id="leaderboard"></div>
      </div>
      <div class="card span2">
        <h2>Points over time</h2>
        <canvas id="timeline"></canvas>
      </div>
      <div class="card">
        <h2>Points by category (top 10)</h2>
        <canvas id="breakdown"></canvas>
      </div>
      <div class="card">
        <h2>Latest results</h2>
        <div id="results"></div>
      </div>
    </div>
  </main>
  <footer>
    Static dashboard — regenerate <code>data.json</code> from the app's Admin tab
    (or <code>uv run python -m wc_contest.export</code>) after each match-day.
    Last generated: <span id="gen"></span>
  </footer>
</body>

</html>
